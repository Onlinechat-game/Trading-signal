<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Alert - Hacken STORE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #fff; text-align: center; padding: 20px; margin: 0; }
        h2 { color: #ffd700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 1.4rem; }
        .subtitle { font-size: 0.8rem; color: #00e676; margin-bottom: 20px; font-weight: bold; }
        
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0, 230, 118, 0.1); max-width: 400px; margin: 0 auto; border: 1px solid #333; }
        
        #price-display { font-size: 1.3rem; font-weight: bold; margin: 10px 0; color: #4fc3f7; font-family: monospace; }
        
        #signal-box {
            margin: 20px 0;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s;
            border: 2px solid transparent;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }
        
        .buy { background: linear-gradient(135deg, rgba(0, 200, 83, 0.2), rgba(0, 200, 83, 0.05)); color: #00e676; border-color: #00e676; box-shadow: 0 0 25px rgba(0, 230, 118, 0.4); animation: pulseGreen 1s infinite; }
        .sell { background: linear-gradient(135deg, rgba(255, 61, 0, 0.2), rgba(255, 61, 0, 0.05)); color: #ff5252; border-color: #ff5252; box-shadow: 0 0 25px rgba(255, 82, 82, 0.4); animation: pulseRed 1s infinite; }
        .wait { background-color: #252525; color: #777; border-color: #444; }
        
        @keyframes pulseGreen { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes pulseRed { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        button {
            background: linear-gradient(90deg, #2962ff, #00b0ff);
            color: white; border: none; padding: 18px; width: 100%;
            font-size: 1.1rem; font-weight: bold; border-radius: 10px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(41, 98, 255, 0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #333; color: #555; cursor: not-allowed; box-shadow: none; }

        .status-log { margin-top: 15px; font-size: 0.75rem; color: #666; font-style: italic; }
        
        .note { font-size: 0.7rem; color: #555; margin-top: 20px; line-height: 1.4; border-top: 1px solid #333; padding-top: 10px; }
        
        .creator-signature {
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            border-top: 1px dashed #444;
            padding-top: 15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .creator-signature span { color: #fff; }
        
        /* Bouton pour activer le son manuellement si le navigateur bloque */
        #enable-sound {
            margin-top: 10px;
            background: #333;
            font-size: 0.8rem;
            padding: 10px;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔔 Bot Alert Hacken</h2>
        <div class="subtitle">Notification + Vibration + Son</div>
        
        <div>Prix Actuel: <span id="price-display">...</span></div>
        
        <div id="signal-box" class="wait">EN ATTENTE</div>
        
        <button id="btn-analyze" onclick="lancerAnalyse()">LANCER L'ANALYSE</button>
        <button id="enable-sound" onclick="activerSon()">🔊 ACTIVER LE SON (Cliquez ici)</button>
        
        <div class="status-log" id="log-msg">En attente d'action...</div>

        <div class="note">
            ⚠️ <strong>Laissez cet onglet ouvert.</strong><br>
            Quand un signal sort, le téléphone <strong>VIBRERA</strong> et affichera une <strong>NOTIFICATION</strong>.<br>
            Expiration : <strong>30 Minutes</strong>.
        </div>

        <div class="creator-signature">
            Creator <span>Hacken STORE</span>
        </div>
    </div>

    <script>
        // Demande de permission pour les notifications au chargement
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        let audioContext = null;
        let isSoundEnabled = false;

        function activerSon() {
            // Initialisation du contexte audio (nécessaire sur mobile après interaction utilisateur)
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            isSoundEnabled = true;
            document.getElementById('enable-sound').innerText = "✅ SON ACTIVÉ";
            document.getElementById('enable-sound').style.background = "#00e676";
            document.getElementById('enable-sound').style.color = "#000";
            jouerSon(600, 'sin'); // Petit bip de test
            alert("Son activé ! Vous serez alerté lors du prochain signal.");
        }

        function jouerSon(freq, type) {
            if (!isSoundEnabled || !audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            
            // Effet de sirène courte
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
            osc.stop(audioContext.currentTime + 0.5);
        }

        function envoyerNotification(titre, message, type) {
            // 1. Notification Navigateur
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(titre, {
                    body: message,
                    icon: type === 'buy' ? 'https://cdn-icons-png.flaticon.com/512/2928/2928836.png' : 'https://cdn-icons-png.flaticon.com/512/2928/2928866.png',
                    tag: 'signal-trading',
                    requireInteraction: true
                });
            }

            // 2. Vibration (Pattern: Long-Court-Long)
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 500]);
            }

            // 3. Son d'alarme (Sirène)
            if (isSoundEnabled && audioContext) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioContext.currentTime);
                osc.frequency.linearRampToValueAtTime(400, audioContext.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.6);
                osc.stop(audioContext.currentTime + 0.6);
                
                // Répéter 2 fois
                setTimeout(() => {
                     const osc2 = audioContext.createOscillator();
                     const gain2 = audioContext.createGain();
                     osc2.type = 'square';
                     osc2.frequency.setValueAtTime(800, audioContext.currentTime);
                     osc2.frequency.linearRampToValueAtTime(400, audioContext.currentTime + 0.3);
                     osc2.connect(gain2);
                     gain2.connect(audioContext.destination);
                     osc2.start();
                     gain2.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.6);
                     osc2.stop(audioContext.currentTime + 0.6);
                }, 700);
            }
        }

        const API_URL = 'https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=15m&limit=60';

        async function getMarketData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Erreur Réseau");
                const data = await response.json();
                const closes = data.map(k => parseFloat(k[4]));
                const highs = data.map(k => parseFloat(k[2]));
                const lows = data.map(k => parseFloat(k[3]));
                return { closes, highs, lows, currentPrice: closes[closes.length - 1] };
            } catch (error) {
                return null;
            }
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period - 1; i < prices.length - 1; i++) {
                const diff = prices[i+1] - prices[i];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            for (let i = 1; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        function calculateADX(highs, lows, closes, period = 14) {
            if (closes.length < period * 2) return 0;
            let plusDMSum = 0, minusDMSum = 0, trSum = 0;
            let trueRanges = [];
            for(let i = closes.length - period; i < closes.length; i++) {
                let high = highs[i], low = lows[i], close = closes[i];
                let prevH = highs[i-1], prevL = lows[i-1];
                let tr = Math.max(high - low, Math.abs(high - close), Math.abs(low - close));
                trueRanges.push(tr);
                let plusDM = high - prevH > prevL - low ? Math.max(0, high - prevH) : 0;
                let minusDM = prevL - low > high - prevH ? Math.max(0, prevL - low) : 0;
                plusDMSum += plusDM;
                minusDMSum += minusDM;
            }
            let avgTR = trueRanges.reduce((a,b)=>a+b,0) / period;
            let avgPlusDM = plusDMSum / period;
            let avgMinusDM = minusDMSum / period;
            let plusDI = (avgPlusDM / avgTR) * 100;
            let minusDI = (avgMinusDM / avgTR) * 100;
            if ((plusDI + minusDI) === 0) return 0;
            return Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100; 
        }

        async function lancerAnalyse() {
            const btn = document.getElementById('btn-analyze');
            const signalBox = document.getElementById('signal-box');
            const priceDisplay = document.getElementById('price-display');
            const logMsg = document.getElementById('log-msg');

            btn.disabled = true;
            btn.innerText = "SURVEILLANCE...";
            logMsg.innerText = "Analyse des indicateurs en cours...";

            const data = await getMarketData();
            
            if (!data) {
                signalBox.innerText = "ERREUR CONNEXION";
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
                return;
            }

            priceDisplay.innerText = data.currentPrice.toFixed(5);

            const emaFast = calculateEMA(data.closes, 9);
            const emaSlow = calculateEMA(data.closes, 21);
            const emaTrend = calculateEMA(data.closes, 50);
            const rsi = calculateRSI(data.closes, 14);
            const adx = calculateADX(data.highs, data.lows, data.closes, 14);
            const lastClose = data.closes[data.closes.length - 1];

            let signal = "ATTENDRE ⚪";
            let type = "wait";
            let messageNotif = "";

            // LOGIQUE PRO
            if (lastClose > emaTrend && rsi < 60 && adx > 20) {
                if (emaFast > emaSlow) {
                    signal = "ACHETER (CALL) 🟢";
                    type = "buy";
                    messageNotif = "Signal ACHAT détecté ! Tendance forte.";
                } else if (rsi < 40) {
                    signal = "ACHETER (CALL) 🟢";
                    type = "buy";
                    messageNotif = "Signal ACHAT détecté ! Rebond sur tendance.";
                }
            }

            if (signal === "ATTENDRE ⚪") {
                if (lastClose < emaTrend && rsi > 40 && adx > 20) {
                    if (emaFast < emaSlow) {
                        signal = "VENDRE (PUT) 🔴";
                        type = "sell";
                        messageNotif = "Signal VENTE détecté ! Tendance forte.";
                    } else if (rsi > 60) {
                        signal = "VENDRE (PUT) 🔴";
                        type = "sell";
                        messageNotif = "Signal VENTE détecté ! Rebond sur tendance.";
                    }
                }
            }

            signalBox.innerText = signal;
            signalBox.className = type;

            if (type !== "wait") {
                logMsg.innerText = "SIGNAL DÉTECTÉ ! Alerte envoyée.";
                logMsg.style.color = type === 'buy' ? '#00e676' : '#ff5252';
                logMsg.style.fontWeight = 'bold';
                
                // DÉCLENCHEMENT DES ALERTES
                envoyerNotification("🚨 SIGNAL HACKEN STORE", messageNotif, type);
                
                // Changer le titre de l'onglet pour qu'on le voit même si on est ailleurs
                document.title = type === 'buy' ? "🟢 ACHETER MAINTENANT" : "🔴 VENDRE MAINTENANT";
            } else {
                logMsg.innerText = "Aucun signal clair pour l'instant.";
                logMsg.style.color = "#666";
                document.title = "Bot Alert - En attente";
            }

            btn.disabled = false;
            btn.innerText = "RELANCER L'ANALYSE";
        }
    </script>
</body>
</html>
